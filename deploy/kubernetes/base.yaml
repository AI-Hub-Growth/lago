apiVersion: v1
kind: Namespace
metadata:
  name: lago
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lago-env
  namespace: lago
data:
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  LAGO_LOG_LEVEL: info
  LAGO_FRONT_URL: https://bo.qnlinking.com
  LAGO_API_URL: https://bo.qnlinking.com/api
  LAGO_PDF_URL: http://lago-pdf:3000
  LAGO_SIDEKIQ_WEB: "false"
  LAGO_DISABLE_SEGMENT: "true"
  LAGO_DISABLE_SIGNUP: "false"
  LAGO_DISABLE_PDF_GENERATION: "false"
  LAGO_USE_AWS_S3: "true"
  LAGO_AWS_S3_REGION: cn-east-1
  LAGO_AWS_S3_BUCKET: lincanvas-test
  LAGO_AWS_S3_ENDPOINT: https://s3.cn-east-1.qiniucs.com
  LAGO_AWS_S3_PATH_STYLE: "true"
  LAGO_UNLOCK_PREMIUM_FEATURES: "true"
  LAGO_UNLOCK_DATA_API_FEATURES: "true"
  LAGO_SKIP_PG_PARTMAN: "true"
  SIDEKIQ_CONCURRENCY: "5"
---
apiVersion: v1
kind: Service
metadata:
  name: lago-api
  namespace: lago
spec:
  selector:
    app.kubernetes.io/name: lago-api
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lago-migrate-script
  namespace: lago
data:
  migrate-rds.sh: |
    #!/bin/sh
    set -eu

    bundle exec rails db:migrate:up VERSION=20250122112050

    if [ "${LAGO_SKIP_PG_PARTMAN:-false}" = "true" ]; then
      bundle exec rails runner - <<'RUBY'
    connection = ActiveRecord::Base.connection
    connection.execute(<<~SQL)
      INSERT INTO schema_migrations (version)
      VALUES ('20260109092932'), ('20260109132143')
      ON CONFLICT DO NOTHING
    SQL
    RUBY
    fi

    bundle exec rails db:migrate

    if [ "${LAGO_SKIP_PG_PARTMAN:-false}" = "true" ]; then
      bundle exec rails runner - <<'RUBY'
    connection = ActiveRecord::Base.connection
    if connection.data_source_exists?("enriched_events") && !connection.data_source_exists?("enriched_events_default")
      connection.execute("CREATE TABLE public.enriched_events_default PARTITION OF public.enriched_events DEFAULT")
    end
    RUBY
    fi

    bundle exec rails roles:seed_predefined
---
apiVersion: v1
kind: Service
metadata:
  name: lago-front
  namespace: lago
spec:
  selector:
    app.kubernetes.io/name: lago-front
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: lago-pdf
  namespace: lago
spec:
  selector:
    app.kubernetes.io/name: lago-pdf
  ports:
    - name: http
      port: 3000
      targetPort: http
