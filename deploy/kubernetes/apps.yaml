apiVersion: apps/v1
kind: Deployment
metadata:
  name: lago-api
  namespace: lago
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lago-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lago-api
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: lago-api
      initContainers:
        - name: wait-for-migrations
          image: ${API_IMAGE}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - until bundle exec rake db:abort_if_pending_migrations; do echo "Waiting for database migrations"; sleep 10; done
          envFrom:
            - configMapRef:
                name: lago-env
            - secretRef:
                name: lago-runtime
            - secretRef:
                name: lago-connections
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: ${API_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["./scripts/start.api.sh"]
          envFrom:
            - configMapRef:
                name: lago-env
            - secretRef:
                name: lago-runtime
            - secretRef:
                name: lago-connections
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
