name: Build GHCR Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-ghcr-images.yml
      - .github/workflows/docker-build-multi-arch.yaml
      - api
      - front

permissions:
  contents: read
  packages: write

jobs:
  refs:
    runs-on: ubuntu-latest
    outputs:
      api_ref: ${{ steps.refs.outputs.api_ref }}
      front_ref: ${{ steps.refs.outputs.front_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Resolve submodule refs
        id: refs
        run: |
          api_ref="$(git ls-tree HEAD api | awk '{print $3}')"
          front_ref="$(git ls-tree HEAD front | awk '{print $3}')"

          if [ -z "$api_ref" ] || [ -z "$front_ref" ]; then
            echo "::error::Could not resolve api/front submodule refs"
            exit 1
          fi

          echo "api_ref=$api_ref" >> "$GITHUB_OUTPUT"
          echo "front_ref=$front_ref" >> "$GITHUB_OUTPUT"

  api:
    needs: refs
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: https://github.com/AI-Hub-Growth/lago-api.git#${{ needs.refs.outputs.api_ref }}
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ai-hub-growth/lago-api:main
            ghcr.io/ai-hub-growth/lago-api:sha-${{ needs.refs.outputs.api_ref }}
          cache-from: type=registry,ref=ghcr.io/ai-hub-growth/lago-api:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/ai-hub-growth/lago-api:buildcache-amd64,mode=max

  front:
    needs: refs
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push front image
        uses: docker/build-push-action@v5
        with:
          context: https://github.com/AI-Hub-Growth/lago-front.git#${{ needs.refs.outputs.front_ref }}
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ai-hub-growth/lago-front:main
            ghcr.io/ai-hub-growth/lago-front:sha-${{ needs.refs.outputs.front_ref }}
          cache-from: type=registry,ref=ghcr.io/ai-hub-growth/lago-front:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/ai-hub-growth/lago-front:buildcache-amd64,mode=max
