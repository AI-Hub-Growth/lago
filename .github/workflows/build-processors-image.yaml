name: "Build Events Processor Production Image"
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-processors-image.yaml"
      - "events-processor/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-processor-image:
    runs-on: ubuntu-latest
    name: Build Events Processor Image
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./events-processor
          file: ./events-processor/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ai-hub-growth/lago-events-processor:main
            ghcr.io/ai-hub-growth/lago-events-processor:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/ai-hub-growth/lago-events-processor:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/ai-hub-growth/lago-events-processor:buildcache-amd64,mode=max
